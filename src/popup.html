<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 15px; width: 220px; color: #222; }
    h3 { margin-top: 0; font-size: 16px; margin-bottom: 15px; }
    
    .setting-group { margin-bottom: 12px; }
    label { display: flex; align-items: center; cursor: pointer; font-size: 14px; }
    select { width: 100%; padding: 6px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px;}
    
    button { width: 100%; padding: 10px; margin-top: 6px; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 14px; }
    #format-btn { background: #0050aa; color: white; }
    #format-btn:hover { background: #003d82; }
    #revert-btn { background: #e5e7eb; color: #374151; }
    #revert-btn:hover { background: #d1d5db; }
  </style>
</head>
<body>
  <h3>AO3 Reader Settings</h3>
  
  <div class="setting-group">
    <label><input type="checkbox" id="auto-enable" style="margin-right: 8px;"> Auto-format</label>
  </div>

  <div class="setting-group">
    <label for="theme-select" style="font-weight: 600; font-size: 12px; color: #555;">STYLE THEME</label>
    <select id="theme-select">
      <option value="theme-springer">Springer Academic</option>
    </select>
  </div>

  <button id="format-btn">Format Page</button>
  <button id="revert-btn">Revert Layout</button>
  
  <script src="popup.js"></script>
</body>
</html>
